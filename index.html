<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Query</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<header>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="material-symbols-outlined">support</span>
                <h1>CARDQUERY</h1>
            </div>
            <ul class="navbar-menu">
                <li class="navbar-item">
                    <hr class="navbar-divider"/>
                </li>
                <li class="navbar-item">
                    <a class="navbar-link" href="/">Home</a>
                </li>
                <li class="navbar-item">
                    <a class="navbar-link" href="/store">Store</a>
                </li>
                <li class="navbar-item">
                    <a class="navbar-link" href="/help">Help</a>
                </li>
                <li class="navbar-item">
                    <hr class="navbar-divider"/>
                </li>
                <li class="navbar-item">
                    <a class="navbar-link" href="/database">Database</a>
                </li>
                <li class="navbar-item">
                    <div class="navbar-searchbar-container">
                        <span class="material-symbols-outlined">search</span>
                        <label>
                            <input class="navbar-searchbar" type="text" placeholder="Search Cardquery">
                        </label>
                    </div>
                </li>
            </ul>
            <div class="navbar-login">
                <button class="navbar-login-button">
                    <span class="material-symbols-outlined">account_circle</span>
                    <span class="navbar-login-text">Sign In</span>
                </button>
            </div>
            <button class="navbar-dropdown-menu" hidden>
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </nav>
</header>
<div class="layout-container">
    <aside class="sidebar">
        <div class="sidebar-container">
            <div class="sidebar-button">
                <button class="sidebar-close-button">
                    <span class="material-symbols-outlined">chevron_backward</span>
                    <span class="sidebar-close-button-text">Close Sidebar</span>
                </button>
            </div>
            <div class="expansion-group">

            </div>
        </div>
    </aside>
    <main class="layout-content">
        <div class="feed-container">
            <span class="material-symbols-outlined">release_alert</span>
            <p class="feed-text">This is a text describing an application wide alert</p>
        </div>
    </main>
</div>
</body>
</html>
